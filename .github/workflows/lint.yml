name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check --output-format=github
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Smoke import
        run: uv run python -c "from bot.handlers import router; print(router)"
      - name: Pytest
        run: uv run pytest -q
