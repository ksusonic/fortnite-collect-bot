name: Docker test image

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional extra suffix appended to the rolling tag (e.g. 'rc1')"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          branch_slug="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+|-+$##g')"
          suffix_raw="${{ inputs.tag_suffix }}"
          suffix_slug="$(echo "$suffix_raw" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+|-+$##g')"
          short_sha="${GITHUB_SHA::7}"
          rolling="test-${branch_slug}"
          if [[ -n "$suffix_slug" ]]; then
            rolling="${rolling}-${suffix_slug}"
          fi
          immutable="${rolling}-${short_sha}"
          image="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "rolling=${rolling}"
            echo "immutable=${immutable}"
            echo "tags=${image}:${rolling},${image}:${immutable}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Test image published"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "Pull with:"
            echo ""
            echo "\`\`\`"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${{ steps.tags.outputs.rolling }}"
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${{ steps.tags.outputs.immutable }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
