services:
  bot:
    image: ghcr.io/ksusonic/fortnite-collect-bot:main
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/bot.db
      HEARTBEAT_FILE: /app/data/heartbeat
      XAI_API_KEY: ${XAI_API_KEY:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,sys,time;
          sys.exit(0 if time.time() - os.path.getmtime('/app/data/heartbeat') < 180 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
